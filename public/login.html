<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | Smart Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-body">

<main class="login-shell">
	<section class="login-hero">
		<p class="eyebrow">CASA DOMOTICA</p>
		<h1>Controla tu hogar desde un solo panel</h1>
		<p>
			Acceso privado al sistema de seguridad, cámara y ambientes inteligentes.
		</p>
	</section>

	<form class="login-card" method="POST" action="/login">
		<h2>Iniciar sesion</h2>
		<p class="login-subtitle">Ingresa tus credenciales de administrador.</p>
		<p id="loginError" class="login-error" hidden>Usuario o contrasena incorrectos.</p>
		<label>
			Usuario
			<input name="username" placeholder="admin" required />
		</label>
		<label>
			Contrasena
			<input type="password" name="password" placeholder="******" required />
		</label>
		<button type="submit">Ingresar</button>
	</form>
</main>

<script>
	const params = new URLSearchParams(window.location.search);
	if (params.get('error') === '1') {
		document.getElementById('loginError').hidden = false;
	}
</script>

</body>
</html>
